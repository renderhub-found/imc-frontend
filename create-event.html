<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Create Event — Inside My Campus</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css"/>
  <link rel="stylesheet" href="style.css"/>
  <style>
    *{box-sizing:border-box;margin:0;padding:0;}
    body{font-family:Inter,sans-serif;background:#f0f2f8;color:#1a1a2e;}
    .page-header{background:#1a3c8f;padding:20px;color:#fff;}
    .page-header h1{font-size:20px;font-weight:800;max-width:900px;margin:0 auto;}
    .form-wrap{max-width:640px;margin:24px auto;padding:0 16px 60px;}
    .form-card{background:#fff;border-radius:16px;padding:28px 24px;
      box-shadow:0 2px 12px rgba(0,0,0,0.08);}
    .form-group{margin-bottom:18px;}
    label{display:block;font-size:13px;font-weight:600;color:#444;margin-bottom:5px;}
    .required{color:#e85d04;}
    input,select,textarea{width:100%;padding:11px 14px;border:1.5px solid #e0e0e0;
      border-radius:8px;font-size:14px;font-family:Inter,sans-serif;outline:none;}
    input:focus,select:focus,textarea:focus{border-color:#1a3c8f;}
    textarea{resize:vertical;min-height:100px;}
    .row2{display:grid;grid-template-columns:1fr 1fr;gap:14px;}
    .btn-submit{width:100%;background:#1a3c8f;color:#fff;border:none;padding:14px;
      border-radius:10px;font-size:15px;font-weight:700;cursor:pointer;
      font-family:Inter,sans-serif;margin-top:8px;}
    .btn-submit:disabled{background:#aaa;}
    .msg{padding:12px 16px;border-radius:8px;font-size:13px;margin-bottom:16px;display:none;}
    .msg.error{background:#fff0f0;color:#c62828;border:1px solid #f5c6cb;}
    .msg.success{background:#e8f9ee;color:#2d8653;border:1px solid #b7e4c7;}
    @media(max-width:480px){.row2{grid-template-columns:1fr;}}
  </style>
</head>
<body>

<div class="page-header">
  <h1>🎉 Create New Event</h1>
</div>

<div class="form-wrap">
  <div class="form-card">
    <div id="msgBox" class="msg"></div>

    <div class="form-group">
      <label>Event Title <span class="required">*</span></label>
      <input type="text" id="evTitle" placeholder="e.g. UNILAG Tech Summit 2024"/>
    </div>

    <div class="form-group">
      <label>Description <span class="required">*</span></label>
      <textarea id="evDescription" placeholder="Describe your event..."></textarea>
    </div>

    <div class="row2">
      <div class="form-group">
        <label>University <span class="required">*</span></label>
        <input type="text" id="evUniversity" placeholder="e.g. UNILAG"/>
      </div>
      <div class="form-group">
        <label>Location <span class="required">*</span></label>
        <input type="text" id="evLocation" placeholder="e.g. Faculty Auditorium"/>
      </div>
    </div>

    <div class="row2">
      <div class="form-group">
        <label>Date <span class="required">*</span></label>
        <input type="date" id="evDate"/>
      </div>
      <div class="form-group">
        <label>Time <span class="required">*</span></label>
        <input type="time" id="evTime"/>
      </div>
    </div>

    <div class="form-group">
      <label>Event Type <span class="required">*</span></label>
      <select id="evType">
        <option value="free">Free Event</option>
        <option value="paid">Paid Event (sells tickets)</option>
      </select>
    </div>

    <div id="ticketTypesSection" style="display:none;margin-bottom:18px;">
      <label>Ticket Types <span class="required">*</span></label>
      <div id="ticketTypeRows"></div>
      <button type="button" id="addTicketTypeBtn"
        style="background:#e8f0fe;color:#1a3c8f;border:1.5px dashed #1a3c8f;border-radius:8px;
        padding:9px 14px;font-size:13px;font-weight:600;cursor:pointer;width:100%;margin-top:6px;">
        <i class="fas fa-plus"></i> Add Ticket Type
      </button>
    </div>

    <div class="form-group" style="margin-bottom:14px;">
  <label>Event Cover Image</label>
  <div class="file-upload-area">
    <input type="file" id="eventCoverFile" accept="image/*" style="display:none;"/>
    <div class="file-upload-placeholder" id="eventCoverPlaceholder"
      onclick="document.getElementById('eventCoverFile').click()">
      <i class="fas fa-image"></i><p>📷 Upload Event Image</p>
    </div>
    <div id="eventCoverPreviewWrap" style="display:none;">
      <img id="eventCoverPreview" src="" style="width:100%;max-height:180px;object-fit:cover;"/>
    </div>
  </div>
</div>

    <div class="form-group">
      <label>Contact Info</label>
      <input type="text" id="evContact" placeholder="Phone, WhatsApp, email..."/>
    </div>

    <button class="btn-submit" id="submitBtn">
      <i class="fas fa-calendar-plus"></i> Create Event
    </button>
  </div>
</div>

<script src="api.js"></script>
<script src="app.js"></script>
<script>
document.addEventListener('DOMContentLoaded', function () {
  if (!IMC_API.isLoggedIn()) {
    window.location.href = 'login.html';
    return;
  }

  // ---- Event type toggle ----
  var evType    = document.getElementById('evType');
  var ttSection = document.getElementById('ticketTypesSection');
  var ttRows    = document.getElementById('ticketTypeRows');

  function addTicketTypeRow(name, price, qty) {
    var row = document.createElement('div');
    row.className = 'ticket-type-row';
    row.style.cssText = 'display:grid;grid-template-columns:2fr 1fr 1fr auto;gap:8px;margin-bottom:8px;align-items:center;';
    row.innerHTML =
      '<input type="text" class="tt-name" placeholder="e.g. VIP, Regular" value="' + (name || '') + '"/>' +
      '<input type="number" class="tt-price" placeholder="Price ₦" min="0" value="' + (price || '') + '"/>' +
      '<input type="number" class="tt-qty" placeholder="Qty" min="1" value="' + (qty || '') + '"/>' +
      '<button type="button" class="tt-remove" style="background:#fff0f0;color:#c62828;border:1px solid #f5c6cb;' +
      'border-radius:6px;width:34px;height:34px;cursor:pointer;"><i class="fas fa-times"></i></button>';
    row.querySelector('.tt-remove').addEventListener('click', function () { row.remove(); });
    ttRows.appendChild(row);
  }

  if (evType) {
    evType.addEventListener('change', function () {
      var isPaid = this.value === 'paid';
      ttSection.style.display = isPaid ? 'block' : 'none';
      if (isPaid && ttRows.children.length === 0) {
        addTicketTypeRow('Regular', '', '');
      }
    });
  }

  var addTtBtn = document.getElementById('addTicketTypeBtn');
  if (addTtBtn) {
    addTtBtn.addEventListener('click', function () { addTicketTypeRow('', '', ''); });
  }

  // ---- Cover image preview ----
  var coverFileInput = document.getElementById('eventCoverFile');
  if (coverFileInput) {
    coverFileInput.addEventListener('change', function () {
      var file = this.files[0];
      if (!file) return;
      if (file.size > 5 * 1024 * 1024) { alert('Image must be under 5MB.'); this.value=''; return; }
      var reader = new FileReader();
      reader.onload = function (e) {
        document.getElementById('eventCoverPreview').src = e.target.result;
        document.getElementById('eventCoverPlaceholder').style.display = 'none';
        document.getElementById('eventCoverPreviewWrap').style.display = 'block';
      };
      reader.readAsDataURL(file);
    });
  }

  document.getElementById('submitBtn').addEventListener('click', async function () {
    var msgBox = document.getElementById('msgBox');
    var btn    = document.getElementById('submitBtn');
    msgBox.style.display = 'none';

    var title       = document.getElementById('evTitle').value.trim();
    var description = document.getElementById('evDescription').value.trim();
    var university  = document.getElementById('evUniversity').value.trim();
    var location    = document.getElementById('evLocation').value.trim();
    var eventDate   = document.getElementById('evDate').value;
    var eventTime   = document.getElementById('evTime').value;
    var contactInfo = document.getElementById('evContact').value.trim();
    var isPaid      = evType.value === 'paid';

    var missing = [];
    if (!title)       missing.push('title');
    if (!description) missing.push('description');
    if (!university)  missing.push('university');
    if (!location)    missing.push('location');
    if (!eventDate)   missing.push('date');
    if (!eventTime)   missing.push('time');

    if (missing.length > 0) {
      msgBox.className     = 'msg error';
      msgBox.textContent   = 'Please fill in: ' + missing.join(', ');
      msgBox.style.display = 'block';
      return;
    }

    var ticketTypes = [];
    if (isPaid) {
      var rows = ttRows.querySelectorAll('.ticket-type-row');
      for (var i = 0; i < rows.length; i++) {
        var name  = rows[i].querySelector('.tt-name').value.trim();
        var price = rows[i].querySelector('.tt-price').value;
        var qty   = rows[i].querySelector('.tt-qty').value;
        if (name && qty) {
          ticketTypes.push({ name: name, price: price || 0, quantity: qty });
        }
      }
      if (ticketTypes.length === 0) {
        msgBox.className     = 'msg error';
        msgBox.textContent   = 'Please add at least one ticket type with a name and quantity.';
        msgBox.style.display = 'block';
        return;
      }
    }

    var formData = new FormData();
    formData.append('title', title);
    formData.append('description', description);
    formData.append('university', university);
    formData.append('location', location);
    formData.append('eventDate', eventDate);
    formData.append('eventTime', eventTime);
    formData.append('contactInfo', contactInfo);
    formData.append('eventType', isPaid ? 'paid' : 'free');
    if (isPaid) formData.append('ticketTypes', JSON.stringify(ticketTypes));

    var coverFile = coverFileInput.files[0];
    if (coverFile) formData.append('coverImage', coverFile);

    btn.disabled     = true;
    btn.textContent  = '⏳ Creating...';

    var result = await IMC_API.createEventWithFile(formData);

    if (result.success) {
      msgBox.className     = 'msg success';
      msgBox.textContent   = 'Event created! Redirecting...';
      msgBox.style.display = 'block';
      setTimeout(function () {
        window.location.href = 'events.html';
      }, 1500);
    } else {
      msgBox.className     = 'msg error';
      msgBox.textContent   = result.message || 'Failed to create event.';
      msgBox.style.display = 'block';
      btn.disabled         = false;
      btn.innerHTML        = '<i class="fas fa-calendar-plus"></i> Create Event';
    }
  });
});
</script>
</body>
</html>
