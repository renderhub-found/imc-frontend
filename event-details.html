<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Event Details — Inside My Campus</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css"/>
  <link rel="stylesheet" href="style.css"/>
  <style>
    *{box-sizing:border-box;margin:0;padding:0;}
    body{font-family:Inter,sans-serif;background:#f0f2f8;color:#1a1a2e;}
    .back-btn{
      display:inline-flex;align-items:center;gap:6px;
      color:#1a3c8f;font-weight:600;font-size:13px;
      text-decoration:none;padding:14px 16px;
    }
    .cover{
      width:100%;height:260px;object-fit:cover;
      background:linear-gradient(135deg,#1a3c8f,#2d5be3);
      display:flex;align-items:center;justify-content:center;font-size:72px;
    }
    .content{max-width:680px;margin:0 auto;padding:0 16px 80px;}
    .event-card{background:#fff;border-radius:16px;overflow:hidden;
      box-shadow:0 2px 12px rgba(0,0,0,0.08);margin-top:-24px;position:relative;}
    .event-main{padding:24px;}
    .event-type-badge{
      display:inline-block;padding:4px 12px;border-radius:20px;
      font-size:11px;font-weight:700;margin-bottom:12px;
      text-transform:uppercase;
    }
    .event-type-badge.free{background:#e8f9ee;color:#2d8653;}
    .event-type-badge.paid{background:#fff0e8;color:#e85d04;}
    h1{font-size:22px;font-weight:800;margin-bottom:14px;line-height:1.2;}
    .meta-grid{
      display:grid;grid-template-columns:1fr 1fr;
      gap:12px;margin-bottom:20px;
    }
    .meta-item{display:flex;align-items:flex-start;gap:8px;}
    .meta-icon{
      width:34px;height:34px;background:#e8f0ff;border-radius:8px;
      display:flex;align-items:center;justify-content:center;
      color:#1a3c8f;font-size:14px;flex-shrink:0;
    }
    .meta-label{font-size:10px;color:#aaa;font-weight:600;text-transform:uppercase;}
    .meta-value{font-size:13px;font-weight:600;color:#1a1a2e;margin-top:2px;}
    .section-title{font-size:15px;font-weight:700;margin-bottom:12px;
      padding-bottom:8px;border-bottom:1px solid #f0f0f0;}
    .description{font-size:14px;color:#555;line-height:1.7;margin-bottom:24px;}

    /* Tickets */
    .ticket-list{display:flex;flex-direction:column;gap:10px;margin-bottom:24px;}
    .ticket-item{
      border:1.5px solid #e0e0e0;border-radius:12px;
      padding:14px 16px;display:flex;align-items:center;
      justify-content:space-between;gap:10px;
      transition:border-color .15s;cursor:pointer;
    }
    .ticket-item:hover{border-color:#1a3c8f;}
    .ticket-item.selected{border-color:#1a3c8f;background:#f0f4ff;}
    .ticket-item.sold-out{opacity:0.5;cursor:not-allowed;}
    .ticket-name{font-size:14px;font-weight:700;}
    .ticket-desc{font-size:12px;color:#888;margin-top:2px;}
    .ticket-qty{font-size:11px;color:#aaa;margin-top:2px;}
    .ticket-price-tag{font-size:16px;font-weight:800;color:#1a3c8f;white-space:nowrap;}
    .ticket-price-tag.free-tag{color:#2d8653;}

    .btn-buy{
      width:100%;background:#1a3c8f;color:#fff;border:none;
      padding:14px;border-radius:10px;font-size:15px;font-weight:700;
      cursor:pointer;font-family:Inter,sans-serif;
      transition:background .15s;
    }
    .btn-buy:hover{background:#0f2456;}
    .btn-buy:disabled{background:#aaa;cursor:not-allowed;}
    .msg{padding:12px 16px;border-radius:8px;font-size:13px;
      margin-bottom:14px;display:none;}
    .msg.error{background:#fff0f0;color:#c62828;border:1px solid #f5c6cb;}
    .msg.success{background:#e8f9ee;color:#2d8653;border:1px solid #b7e4c7;}

    .ticket-confirm{
      background:#e8f9ee;border:1px solid #b7e4c7;border-radius:12px;
      padding:16px;text-align:center;display:none;margin-bottom:16px;
    }
    .ticket-confirm h3{font-size:16px;font-weight:700;color:#2d8653;margin-bottom:4px;}
    .ticket-code{font-size:18px;font-weight:800;font-family:monospace;
      background:#fff;padding:8px 16px;border-radius:8px;
      border:2px dashed #b7e4c7;display:inline-block;margin:8px 0;}
    .skel{background:linear-gradient(90deg,#f0f0f0 25%,#e0e0e0 50%,#f0f0f0 75%);
      background-size:200% 100%;animation:sh 1.5s infinite;border-radius:8px;}
    @keyframes sh{to{background-position:-200% 0;}}
    @media(max-width:480px){.meta-grid{grid-template-columns:1fr;}}
  </style>
</head>
<body>

<a href="events.html" class="back-btn"><i class="fas fa-arrow-left"></i> Back to Events</a>

<div id="loadingState">
  <div class="skel" style="height:260px;margin:0 0 -24px;border-radius:0;"></div>
  <div class="content">
    <div class="event-card">
      <div class="event-main">
        <div class="skel" style="height:20px;width:80px;margin-bottom:12px;"></div>
        <div class="skel" style="height:28px;margin-bottom:14px;"></div>
        <div class="skel" style="height:80px;margin-bottom:16px;"></div>
        <div class="skel" style="height:100px;"></div>
      </div>
    </div>
  </div>
</div>

<div id="mainContent" style="display:none;">
  <div id="coverWrap"></div>

  <div class="content">
    <div class="event-card">
      <div class="event-main">

        <div id="eventTypeBadge" class="event-type-badge"></div>
        <h1 id="eventTitle"></h1>

        <div class="meta-grid">
          <div class="meta-item">
            <div class="meta-icon"><i class="fas fa-calendar"></i></div>
            <div><div class="meta-label">Date</div><div class="meta-value" id="metaDate"></div></div>
          </div>
          <div class="meta-item">
            <div class="meta-icon"><i class="fas fa-clock"></i></div>
            <div><div class="meta-label">Time</div><div class="meta-value" id="metaTime"></div></div>
          </div>
          <div class="meta-item">
            <div class="meta-icon"><i class="fas fa-map-marker-alt"></i></div>
            <div><div class="meta-label">Location</div><div class="meta-value" id="metaLocation"></div></div>
          </div>
          <div class="meta-item">
            <div class="meta-icon"><i class="fas fa-university"></i></div>
            <div><div class="meta-label">University</div><div class="meta-value" id="metaUni"></div></div>
          </div>
          <div class="meta-item">
            <div class="meta-icon"><i class="fas fa-user"></i></div>
            <div><div class="meta-label">Organizer</div><div class="meta-value" id="metaOrganizer"></div></div>
          </div>
          <div class="meta-item" id="contactWrap" style="display:none;">
            <div class="meta-icon"><i class="fas fa-phone"></i></div>
            <div><div class="meta-label">Contact</div><div class="meta-value" id="metaContact"></div></div>
          </div>
        </div>

        <div class="section-title">About this Event</div>
        <div class="description" id="eventDesc"></div>

        <div class="section-title" id="ticketSectionTitle">Get Tickets</div>
        <div id="msgBox" class="msg"></div>
        <div id="ticketConfirm" class="ticket-confirm">
          <h3>🎉 Ticket Purchased!</h3>
          <p>Your ticket code:</p>
          <div class="ticket-code" id="ticketCodeDisplay"></div>
          <p style="font-size:12px;color:#666;margin-top:6px;">
            Save this code — present it at the event entrance.
          </p>
        </div>
        <div class="ticket-list" id="ticketList"></div>
        <button class="btn-buy" id="buyBtn" style="display:none;">
          <span id="buyBtnText">Get Ticket</span>
          <span id="buySpinner" style="display:none;">⏳ Processing...</span>
        </button>

      </div>
    </div>
  </div>
</div>

<div id="errorState" style="display:none;text-align:center;padding:60px 20px;color:#aaa;">
  <i class="fas fa-exclamation-triangle" style="font-size:40px;display:block;margin-bottom:12px;"></i>
  <p>Event not found.</p>
  <a href="events.html" style="color:#1a3c8f;font-weight:700;">Back to Events</a>
</div>

<script src="api.js"></script>
<script src="app.js"></script>
<script>

var eventData       = null;
var selectedTicket  = null;

document.addEventListener('DOMContentLoaded', async function () {
  var params  = new URLSearchParams(window.location.search);
  var eventId = params.get('id') || '';

  if (!eventId) {
    document.getElementById('loadingState').style.display = 'none';
    document.getElementById('errorState').style.display   = 'block';
    return;
  }

  var base = (window.location.hostname === 'localhost' ||
              window.location.hostname === '127.0.0.1')
    ? 'http://localhost:5000'
    : 'https://imc-backend-0i5i.onrender.com';

  try {
    var res    = await fetch(base + '/api/events/' + eventId);
    var result = await res.json();

    if (!result.success || !result.event) {
      throw new Error('Not found');
    }

    eventData = result.event;
    renderEvent();

  } catch (e) {
    document.getElementById('loadingState').style.display = 'none';
    document.getElementById('errorState').style.display   = 'block';
  }
});

function renderEvent() {
  var ev = eventData;

  document.getElementById('loadingState').style.display = 'none';
  document.getElementById('mainContent').style.display  = 'block';

  // Cover
  var coverWrap = document.getElementById('coverWrap');
  coverWrap.innerHTML = ev.coverImage
    ? '<img class="cover" src="' + esc(ev.coverImage) +
      '" onerror="this.outerHTML=\'<div class=&quot;cover&quot;>🎉</div>\'"/>'
    : '<div class="cover">🎉</div>';

  // Badge
  var badge = document.getElementById('eventTypeBadge');
  badge.className   = 'event-type-badge ' + (ev.eventType || 'free');
  badge.textContent = ev.eventType === 'paid' ? '🎟 Paid Event' : '🆓 Free Event';

  // Info
  document.getElementById('eventTitle').textContent = ev.title;
  document.title = ev.title + ' — Inside My Campus';

  var d = new Date(ev.eventDate);
  document.getElementById('metaDate').textContent =
    d.toLocaleDateString('en-GB', { weekday:'long', day:'2-digit', month:'long', year:'numeric' });
  document.getElementById('metaTime').textContent      = ev.eventTime;
  document.getElementById('metaLocation').textContent  = ev.location;
  document.getElementById('metaUni').textContent       = ev.university;
  document.getElementById('metaOrganizer').textContent = ev.organizerName;
  document.getElementById('eventDesc').textContent     = ev.description;

  if (ev.contactInfo) {
    document.getElementById('contactWrap').style.display = 'flex';
    document.getElementById('metaContact').textContent   = ev.contactInfo;
  }

  // Tickets
  renderTickets();
}

function renderTickets() {
  var ev         = eventData;
  var ticketList = document.getElementById('ticketList');
  var buyBtn     = document.getElementById('buyBtn');

  if (!ev.ticketTypes || ev.ticketTypes.length === 0) {
    // Free event no tickets
    if (ev.eventType === 'free') {
      ticketList.innerHTML =
        '<p style="color:#2d8653;font-weight:600;font-size:14px;">' +
        '✅ This is a free event. No ticket required — just show up!</p>';
      document.getElementById('ticketSectionTitle').textContent = 'Attendance';
    } else {
      ticketList.innerHTML = '<p style="color:#888;font-size:14px;">No tickets available.</p>';
    }
    return;
  }

  ticketList.innerHTML = ev.ticketTypes.map(function (tt, idx) {
    var soldOut = tt.remaining <= 0;
    return '<div class="ticket-item' + (soldOut ? ' sold-out' : '') + '" ' +
      (soldOut ? '' : 'onclick="selectTicket(this,' + idx + ')"') +
      ' data-idx="' + idx + '">' +
      '<div>' +
      '<div class="ticket-name">' + esc(tt.name) + (soldOut ? ' — SOLD OUT' : '') + '</div>' +
      (tt.description ? '<div class="ticket-desc">' + esc(tt.description) + '</div>' : '') +
      '<div class="ticket-qty">' + tt.remaining + ' remaining</div>' +
      '</div>' +
      '<div class="ticket-price-tag' + (tt.isFree || tt.price === 0 ? ' free-tag' : '') + '">' +
      (tt.isFree || tt.price === 0 ? 'FREE' : '₦' + tt.price.toLocaleString()) +
      '</div>' +
      '</div>';
  }).join('');

if (event.eventType === 'free') {
  // POST /api/events/:id/tickets/:freeTicketTypeId/purchase with amount 0
} else {
  // open Paystack via IMCPaystack.openPayment(...), then on success
  // POST /api/events/:id/tickets/:ticketTypeId/purchase with paymentRef
}

  buyBtn.style.display = 'block';
  buyBtn.addEventListener('click', handleBuyTicket);
}

function selectTicket(el, idx) {
  document.querySelectorAll('.ticket-item').forEach(function (item) {
    item.classList.remove('selected');
  });
  el.classList.add('selected');
  selectedTicket = eventData.ticketTypes[idx];
  selectedTicket._id = eventData.ticketTypes[idx]._id || idx;

  var btn = document.getElementById('buyBtnText');
  if (selectedTicket.isFree || selectedTicket.price === 0) {
    btn.textContent = 'Get Free Ticket';
  } else {
    btn.textContent = 'Buy Ticket — ₦' + selectedTicket.price.toLocaleString();
  }
}

async function handleBuyTicket() {
  var msgBox = document.getElementById('msgBox');
  msgBox.style.display = 'none';

  if (!IMC_API.isLoggedIn()) {
    window.location.href = 'login.html?redirect=' + encodeURIComponent(window.location.href);
    return;
  }

  if (!selectedTicket) {
    msgBox.className   = 'msg error';
    msgBox.textContent = 'Please select a ticket type first.';
    msgBox.style.display = 'block';
    return;
  }

  var buyBtn  = document.getElementById('buyBtn');
  var buyTxt  = document.getElementById('buyBtnText');
  var buySpn  = document.getElementById('buySpinner');

  buyBtn.disabled      = true;
  buyTxt.style.display = 'none';
  buySpn.style.display = 'inline';

  var base = (window.location.hostname === 'localhost' ||
              window.location.hostname === '127.0.0.1')
    ? 'http://localhost:5000'
    : 'https://imc-backend-0i5i.onrender.com';

  var ticketTypeId = selectedTicket._id;
  var paymentRef   = (selectedTicket.isFree || selectedTicket.price === 0) ? 'FREE' : '';

  var res  = await fetch(
    base + '/api/events/' + eventData._id + '/tickets/' + ticketTypeId + '/purchase',
    {
      method:  'POST',
      headers: {
        'Content-Type':  'application/json',
        'Authorization': 'Bearer ' + IMC_API.getToken()
      },
      body: JSON.stringify({ paymentRef: paymentRef })
    }
  );
  var result = await res.json();

  buyBtn.disabled      = false;
  buyTxt.style.display = 'inline';
  buySpn.style.display = 'none';

  if (result.success) {
    document.getElementById('ticketCodeDisplay').textContent = result.ticketCode;
    document.getElementById('ticketConfirm').style.display  = 'block';
    document.getElementById('ticketList').style.display     = 'none';
    buyBtn.style.display                                    = 'none';
    window.scrollTo({ top: 0, behavior: 'smooth' });
  } else {
    msgBox.className     = 'msg error';
    msgBox.textContent   = result.message || 'Purchase failed. Please try again.';
    msgBox.style.display = 'block';
  }
}

function esc(s) {
  return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}
</script>
</body>
</html>
