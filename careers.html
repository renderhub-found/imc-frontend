<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Careers – Inside My Campus</title>
  <link rel="stylesheet" href="style.css"/>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"/>
</head>
<body>

  <div id="navbarPlaceholder"></div>

  <div class="page-hero" style="background:linear-gradient(135deg,#1a3c8f,#011B33);padding:48px 16px;text-align:center;">
    <div class="page-hero-content">
      <h1 style="color:#fff;font-size:28px;font-weight:800;margin-bottom:8px;">Careers</h1>
      <p style="color:#d0dbf5;font-size:14px;max-width:480px;margin:0 auto;">
        Help build the platform Nigerian campuses run on.
      </p>
    </div>
  </div>

  <div class="section" style="max-width:720px;margin:32px auto;padding:0 16px;">
    <div class="dash-form-card" style="padding:28px 20px;text-align:center;">
      <div style="font-size:40px;margin-bottom:12px;">💼</div>
      <h3 style="font-size:18px;font-weight:700;color:#1a1a2e;margin-bottom:10px;">
        No open roles right now
      </h3>
      <p style="font-size:14px;color:#666;line-height:1.6;max-width:480px;margin:0 auto 20px;">
        We're not hiring at the moment, but we're growing fast. If you're
        a Nigerian student interested in working with us, becoming a
        Campus Ambassador is the best way to get involved today.
      </p>
      <a href="ambassador.html" class="btn-view-profile"
        style="display:inline-block;padding:11px 24px;text-decoration:none;">
        Become an Ambassador
      </a>
    </div>
  </div>

  <div id="footerPlaceholder"></div>
  <script src="api.js"></script>
</body>
</html>
