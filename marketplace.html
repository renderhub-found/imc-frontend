<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Marketplace — Inside My Campus</title>
  <link rel="stylesheet" href="style.css"/>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>
  <style>
    .market-hero{
      background:linear-gradient(135deg,#1a3c8f,#011B33);
      padding:40px 16px 32px;text-align:center;
    }
    .market-hero h1{color:#fff;font-size:26px;font-weight:800;margin-bottom:8px;}
    .market-hero p{color:#d0dbf5;font-size:14px;margin-bottom:20px;}
    .market-search-bar{
      display:flex;gap:8px;max-width:520px;margin:0 auto;
    }
    .market-search-bar input{
      flex:1;padding:12px 16px;border:none;border-radius:10px;
      font-size:14px;font-family:Inter,sans-serif;outline:none;
    }
    .market-search-bar button{
      padding:12px 20px;background:#2d8653;color:#fff;border:none;
      border-radius:10px;cursor:pointer;font-weight:700;font-size:14px;
    }
    .market-filters{
      display:flex;gap:8px;padding:16px;overflow-x:auto;
      background:#fff;border-bottom:1px solid #f0f0f0;
    }
    .market-filter-btn{
      padding:7px 16px;border:1.5px solid #e0e0e0;background:#fff;
      border-radius:20px;font-size:12px;font-weight:600;cursor:pointer;
      color:#666;white-space:nowrap;font-family:Inter,sans-serif;
      transition:all .15s;
    }
    .market-filter-btn.active{
      border-color:#1a3c8f;background:#1a3c8f;color:#fff;
    }
    .market-container{
      max-width:1100px;margin:0 auto;padding:20px 16px;
    }
    .market-grid{
      display:grid;
      grid-template-columns:repeat(auto-fill,minmax(200px,1fr));
      gap:16px;
    }
    .market-card{
      background:#fff;border-radius:14px;overflow:hidden;
      box-shadow:0 2px 12px rgba(0,0,0,0.07);cursor:pointer;
      transition:transform .15s,box-shadow .15s;
      text-decoration:none;color:inherit;display:block;
    }
    .market-card:hover{
      transform:translateY(-3px);
      box-shadow:0 6px 20px rgba(0,0,0,0.12);
    }
    .market-card-img{
      width:100%;height:170px;object-fit:cover;
      background:#f4f6fb;
    }
    .market-card-body{padding:12px 14px 14px;}
    .market-card-name{
      font-size:14px;font-weight:700;color:#1a1a2e;
      margin-bottom:4px;white-space:nowrap;
      overflow:hidden;text-overflow:ellipsis;
    }
    .market-card-vendor{font-size:12px;color:#888;margin-bottom:4px;}
    .market-card-price{
      font-size:16px;font-weight:800;color:#2d8653;
    }
    .market-card-school{
      font-size:11px;color:#aaa;margin-top:4px;
    }
    .market-empty{
      text-align:center;padding:60px 20px;color:#aaa;
      grid-column:1/-1;
    }
    .market-empty i{font-size:40px;display:block;margin-bottom:12px;}
    .market-results-count{
      font-size:13px;color:#888;margin-bottom:14px;
    }
    @media(max-width:600px){
      .market-grid{grid-template-columns:repeat(2,1fr);}
      .market-card-img{height:140px;}
    }
  </style>
</head>
<body>

  <!-- NAVBAR -->
  <nav class="navbar">
    <div class="nav-container">
      <div class="nav-logo">
        <a href="index.html" style="display:flex;align-items:center;gap:10px;">
          <div class="logo-icon">🏫</div>
          <span class="logo-text">Inside My Campus</span>
        </a>
      </div>
      <ul class="nav-links" id="navLinks">
        <li><a href="vendors-page.html">Vendors</a></li>
        <li><a href="marketplace.html" class="active">Marketplace</a></li>
        <li><a href="campus-news.html">Campus News</a></li>
        <li><a href="events.html">Events</a></li>
      </ul>
      <div class="nav-right">
        <div class="auth-buttons" id="authButtons">
          <a href="login.html" class="btn-login">Login</a>
          <a href="signup.html" class="btn-signup">Sign Up</a>
        </div>
        <div class="user-menu" id="userMenu" style="display:none;">
          <button class="hamburger-btn" id="hamburgerBtn">
            <i class="fas fa-bars"></i>
          </button>
          <div class="dropdown-menu" id="dropdownMenu">
            <a href="vendor.html"><i class="fas fa-store"></i> Become Vendor</a>
            <a href="ambassador.html"><i class="fas fa-user-tie"></i> Become Ambassador</a>
            <a href="campus-news.html"><i class="fas fa-newspaper"></i> Campus News</a>
            <a href="post-ad.html"><i class="fas fa-ad"></i> Post Ad</a>
            <a href="events.html"><i class="fas fa-calendar"></i> Events</a>
            <a href="online-courses.html"><i class="fas fa-graduation-cap"></i> Online Courses</a>
            <a href="contact.html"><i class="fas fa-envelope"></i> Contact</a>
            <a href="#" id="logoutBtn" class="logout-link"><i class="fas fa-sign-out-alt"></i> Logout</a>
          </div>
        </div>
        <button class="mobile-nav-toggle" id="mobileNavToggle">
          <i class="fas fa-bars"></i>
        </button>
      </div>
    </div>
  </nav>

  <!-- HERO -->
  <div class="market-hero">
    <h1>🛍️ Campus Marketplace</h1>
    <p>Discover products from verified student vendors across Nigerian universities</p>
    <div class="market-search-bar">
      <input type="text" id="marketSearchInput"
        placeholder="Search products, vendors, universities..."/>
      <button onclick="searchMarket()">
        <i class="fas fa-search"></i> Search
      </button>
    </div>
  </div>

  <!-- CATEGORY FILTERS -->
  <div class="market-filters" id="marketFilters">
    <button class="market-filter-btn active" onclick="filterCategory('all',this)">
      All Products
    </button>
    <button class="market-filter-btn" onclick="filterCategory('Food',this)">🍲 Food</button>
    <button class="market-filter-btn" onclick="filterCategory('Fashion',this)">👗 Fashion</button>
    <button class="market-filter-btn" onclick="filterCategory('Gadgets',this)">📱 Gadgets</button>
    <button class="market-filter-btn" onclick="filterCategory('Beauty',this)">💄 Beauty</button>
    <button class="market-filter-btn" onclick="filterCategory('Books',this)">📚 Books</button>
    <button class="market-filter-btn" onclick="filterCategory('Accessories',this)">⌚ Accessories</button>
    <button class="market-filter-btn" onclick="filterCategory('Services',this)">🛠️ Services</button>
    <button class="market-filter-btn" onclick="filterCategory('Others',this)">📦 Others</button>
  </div>

  <!-- PRODUCT GRID -->
  <div class="market-container">
    <div class="market-results-count" id="marketResultsCount"></div>
    <div class="market-grid" id="marketGrid">
      <div class="market-empty">
        <i class="fas fa-spinner fa-spin"></i>
        Loading products...
      </div>
    </div>
  </div>

  <script src="api.js"></script>
  <script src="navbar.js"></script>
  <script>
    var ALL_PRODUCTS = [];
    var ACTIVE_CATEGORY = 'all';
    var SEARCH_QUERY    = '';

    document.addEventListener('DOMContentLoaded', async function () {
      var result = await IMC_API.getAllProducts();
      if (result.success && result.products) {
        ALL_PRODUCTS = result.products;
        renderProducts(ALL_PRODUCTS);
      } else {
        document.getElementById('marketGrid').innerHTML =
          '<div class="market-empty">' +
          '<i class="fas fa-box-open"></i>' +
          '<p>No products available yet. Check back soon!</p>' +
          '</div>';
      }

      var input = document.getElementById('marketSearchInput');
      if (input) {
        input.addEventListener('keyup', function (e) {
          if (e.key === 'Enter') searchMarket();
        });
      }

      var urlCat = new URLSearchParams(window.location.search).get('cat');
      if (urlCat) {
        var matchBtn = null;
        document.querySelectorAll('.market-filter-btn').forEach(function (b) {
          if (b.getAttribute('onclick') === "filterCategory('" + urlCat + "',this)") matchBtn = b;
        });
        filterCategory(urlCat, matchBtn);
      }
    });

    function renderProducts(products) {
      var grid      = document.getElementById('marketGrid');
      var countEl   = document.getElementById('marketResultsCount');
      if (countEl) countEl.textContent = products.length + ' product' + (products.length !== 1 ? 's' : '') + ' found';

      if (!products.length) {
        grid.innerHTML =
          '<div class="market-empty">' +
          '<i class="fas fa-search"></i>' +
          '<p>No products match your search. Try a different keyword.</p>' +
          '</div>';
        return;
      }

      grid.innerHTML = products.map(function (p) {
        var img = p.image || 'https://images.unsplash.com/photo-1607082348824-0a96f2a4b9da?w=400&h=300&fit=crop';
        return '<a class="market-card" href="product-details.html?id=' + p._id + '">' +
          '<img class="market-card-img" src="' + img + '" alt="' + esc(p.name) + '" loading="lazy"/>' +
          '<div class="market-card-body">' +
          '<div class="market-card-name">' + esc(p.name) + '</div>' +
          '<div class="market-card-vendor"><i class="fas fa-store" style="color:#1a3c8f;margin-right:4px;"></i>' + esc(p.vendorName || '') + '</div>' +
          '<div class="market-card-price">₦' + parseFloat(p.price || 0).toLocaleString() + '</div>' +
          '<div class="market-card-school"><i class="fas fa-university" style="margin-right:4px;"></i>' + esc(p.university || '') + '</div>' +
          '</div></a>';
      }).join('');
    }

    function searchMarket() {
      SEARCH_QUERY = (document.getElementById('marketSearchInput').value || '').toLowerCase().trim();
      applyFilters();
    }

    function filterCategory(cat, btn) {
      ACTIVE_CATEGORY = cat;
      document.querySelectorAll('.market-filter-btn').forEach(function (b) {
        b.classList.remove('active');
      });
      if (btn) btn.classList.add('active');
      applyFilters();
    }

    function applyFilters() {
      var filtered = ALL_PRODUCTS.filter(function (p) {
        var matchCat = ACTIVE_CATEGORY === 'all' ||
          (p.category || '').toLowerCase() === ACTIVE_CATEGORY.toLowerCase();
        var matchQ = !SEARCH_QUERY ||
          (p.name || '').toLowerCase().includes(SEARCH_QUERY) ||
          (p.vendorName || '').toLowerCase().includes(SEARCH_QUERY) ||
          (p.university || '').toLowerCase().includes(SEARCH_QUERY) ||
          (p.description || '').toLowerCase().includes(SEARCH_QUERY);
        return matchCat && matchQ;
      });
      renderProducts(filtered);
    }

    function esc(str) {
      return String(str || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
    }
  </script>
</body>
</html>
