<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Forgot Password — Inside My Campus</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css"/>
  <link rel="stylesheet" href="style.css"/>
  <style>
    body{display:flex;align-items:center;justify-content:center;
      min-height:100vh;background:#f0f2f8;font-family:Inter,sans-serif;padding:20px;}
    .card{background:#fff;border-radius:20px;padding:40px 32px;
      max-width:420px;width:100%;box-shadow:0 8px 40px rgba(0,0,0,0.1);}
    .back{display:inline-flex;align-items:center;gap:6px;color:#888;
      font-size:13px;text-decoration:none;margin-bottom:20px;}
    .back:hover{color:#1a3c8f;}
    .icon-wrap{width:60px;height:60px;background:#e8f0ff;border-radius:16px;
      display:flex;align-items:center;justify-content:center;font-size:26px;margin-bottom:16px;}
    h2{font-size:22px;font-weight:800;color:#1a1a2e;margin-bottom:6px;}
    p.desc{font-size:14px;color:#888;margin-bottom:24px;line-height:1.5;}
    label{display:block;font-size:13px;font-weight:600;color:#444;margin-bottom:5px;}
    input{width:100%;padding:12px 14px;border:1.5px solid #e0e0e0;border-radius:8px;
      font-size:14px;font-family:Inter,sans-serif;outline:none;margin-bottom:16px;}
    input:focus{border-color:#1a3c8f;}
    .btn{width:100%;background:#1a3c8f;color:#fff;border:none;padding:13px;
      border-radius:10px;font-size:15px;font-weight:700;cursor:pointer;
      font-family:Inter,sans-serif;}
    .btn:disabled{background:#aaa;}
    .msg{padding:12px 16px;border-radius:8px;font-size:13px;margin-bottom:16px;display:none;}
    .msg.success{background:#e8f9ee;color:#2d8653;border:1px solid #b7e4c7;}
    .msg.error{background:#fff0f0;color:#c62828;border:1px solid #f5c6cb;}
  </style>
</head>
<body>
<div class="card">
  <a href="login.html" class="back"><i class="fas fa-arrow-left"></i> Back to Login</a>
  <div class="icon-wrap">🔐</div>
  <h2>Forgot Password?</h2>
  <p class="desc">Enter your email address and we will send you a reset link.</p>

  <div id="msgBox" class="msg"></div>

  <div id="formSection">
    <label for="emailInput">Email Address</label>
    <input type="email" id="emailInput" placeholder="your@email.com"/>
    <button class="btn" id="submitBtn">
      <span id="btnText"><i class="fas fa-paper-plane"></i> Send Reset Link</span>
      <span id="btnSpinner" style="display:none;">⏳ Sending...</span>
    </button>
  </div>
</div>

<script src="api.js"></script>
<script>
document.getElementById('submitBtn').addEventListener('click', async function () {
  var email  = document.getElementById('emailInput').value.trim();
  var msgBox = document.getElementById('msgBox');
  var btnTxt = document.getElementById('btnText');
  var btnSpn = document.getElementById('btnSpinner');
  var btn    = document.getElementById('submitBtn');

  msgBox.style.display = 'none';

  if (!email) {
    msgBox.className     = 'msg error';
    msgBox.textContent   = 'Please enter your email address.';
    msgBox.style.display = 'block';
    return;
  }

  btnTxt.style.display = 'none';
  btnSpn.style.display = 'inline';
  btn.disabled         = true;

  var result = await IMC_API.forgotPassword(email);

  btnTxt.style.display = 'inline';
  btnSpn.style.display = 'none';
  btn.disabled         = false;

  msgBox.className     = 'msg success';
  msgBox.textContent   = 'If this email exists, a reset link has been sent. Check your inbox.';
  msgBox.style.display = 'block';

  document.getElementById('formSection').style.opacity = '0.5';
  document.getElementById('submitBtn').disabled        = true;
});

document.getElementById('emailInput').addEventListener('keydown', function (e) {
  if (e.key === 'Enter') document.getElementById('submitBtn').click();
});
</script>
</body>
</html>
