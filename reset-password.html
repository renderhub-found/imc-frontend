<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Reset Password — Inside My Campus</title>
  <link rel="stylesheet" href="style.css"/>
</head>
<body>
  <div class="auth-container">
    <div class="auth-card">
      <h2 class="auth-title">Reset Password</h2>

      <div id="resetForm">
        <div class="form-group">
          <label>New Password</label>
          <input type="password" id="newPassword"
            placeholder="Minimum 6 characters" class="form-input"/>
        </div>
        <div class="form-group">
          <label>Confirm Password</label>
          <input type="password" id="confirmPassword"
            placeholder="Repeat new password" class="form-input"/>
        </div>

        <div id="resetError" class="auth-error" style="display:none;">
          <span id="resetErrorMsg"></span>
        </div>

        <button id="resetBtn" class="btn-primary" style="width:100%;">
          <span id="resetBtnText">Reset Password</span>
          <span id="resetSpinner" style="display:none;">⏳</span>
        </button>
      </div>

      <div id="resetSuccess" style="display:none;text-align:center;padding:20px;">
        <div style="font-size:48px;margin-bottom:12px;">✅</div>
        <h3>Password Reset!</h3>
        <p style="color:#666;margin-bottom:16px;">
          Your password has been updated successfully.
        </p>
        <a href="login.html" class="btn-primary">Login Now</a>
      </div>

    </div>
  </div>

  <script src="api.js"></script>
  <script>
  document.addEventListener('DOMContentLoaded', function () {
    var params = new URLSearchParams(window.location.search);
    var token  = params.get('token') || '';

    if (!token) {
      document.getElementById('resetForm').innerHTML =
        '<p style="color:#e85d04;text-align:center;">' +
        'Invalid reset link. Please request a new one.</p>' +
        '<a href="login.html" style="display:block;text-align:center;' +
        'margin-top:12px;color:#1a3c8f;">Back to Login</a>';
      return;
    }

    var resetBtn = document.getElementById('resetBtn');
    if (!resetBtn) return;

    resetBtn.addEventListener('click', async function () {
      var password = document.getElementById('newPassword').value.trim();
      var confirm  = document.getElementById('confirmPassword').value.trim();
      var errBox   = document.getElementById('resetError');
      var errMsg   = document.getElementById('resetErrorMsg');
      var btnText  = document.getElementById('resetBtnText');
      var spinner  = document.getElementById('resetSpinner');

      errBox.style.display = 'none';

      if (!password) {
        errMsg.textContent = 'Please enter a new password.';
        errBox.style.display = 'flex';
        return;
      }
      if (password.length < 6) {
        errMsg.textContent = 'Password must be at least 6 characters.';
        errBox.style.display = 'flex';
        return;
      }
      if (password !== confirm) {
        errMsg.textContent = 'Passwords do not match.';
        errBox.style.display = 'flex';
        return;
      }

      btnText.style.display = 'none';
      spinner.style.display = 'inline';
      resetBtn.disabled     = true;

      var result = await IMC_API.resetPassword(token, password);

      if (result.success) {
        document.getElementById('resetForm').style.display   = 'none';
        document.getElementById('resetSuccess').style.display = 'block';
      } else {
        errMsg.textContent   = result.message || 'Reset failed.';
        errBox.style.display = 'flex';
        btnText.style.display = 'inline';
        spinner.style.display = 'none';
        resetBtn.disabled     = false;
      }
    });
  });
  </script>
</body>
</html>
