<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Reset Password — Inside My Campus</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css"/>
  <link rel="stylesheet" href="style.css"/>
  <style>
    body{display:flex;align-items:center;justify-content:center;
      min-height:100vh;background:#f0f2f8;font-family:Inter,sans-serif;padding:20px;}
    .card{background:#fff;border-radius:20px;padding:40px 32px;
      max-width:420px;width:100%;box-shadow:0 8px 40px rgba(0,0,0,0.1);}
    .icon-wrap{width:60px;height:60px;background:#e8f0ff;border-radius:16px;
      display:flex;align-items:center;justify-content:center;font-size:26px;margin-bottom:16px;}
    h2{font-size:22px;font-weight:800;color:#1a1a2e;margin-bottom:6px;}
    p.desc{font-size:14px;color:#888;margin-bottom:24px;}
    label{display:block;font-size:13px;font-weight:600;color:#444;margin-bottom:5px;}
    input{width:100%;padding:12px 14px;border:1.5px solid #e0e0e0;border-radius:8px;
      font-size:14px;font-family:Inter,sans-serif;outline:none;margin-bottom:16px;}
    input:focus{border-color:#1a3c8f;}
    .btn{width:100%;background:#1a3c8f;color:#fff;border:none;padding:13px;
      border-radius:10px;font-size:15px;font-weight:700;cursor:pointer;
      font-family:Inter,sans-serif;}
    .btn:disabled{background:#aaa;}
    .msg{padding:12px 16px;border-radius:8px;font-size:13px;margin-bottom:16px;display:none;}
    .msg.success{background:#e8f9ee;color:#2d8653;border:1px solid #b7e4c7;}
    .msg.error{background:#fff0f0;color:#c62828;border:1px solid #f5c6cb;}
  </style>
</head>
<body>
<div class="card">
  <div class="icon-wrap">🔑</div>
  <h2>Create New Password</h2>
  <p class="desc">Enter your new password below.</p>

  <div id="msgBox" class="msg"></div>

  <div id="formSection">
    <label>New Password</label>
    <input type="password" id="newPass" placeholder="Minimum 6 characters"/>
    <label>Confirm Password</label>
    <input type="password" id="confirmPass" placeholder="Repeat new password"/>
    <button class="btn" id="resetBtn">
      <span id="btnText"><i class="fas fa-lock"></i> Reset Password</span>
      <span id="btnSpinner" style="display:none;">⏳ Saving...</span>
    </button>
  </div>

  <div id="successSection" style="display:none;text-align:center;padding:20px 0;">
    <div style="font-size:52px;margin-bottom:12px;">✅</div>
    <h3 style="font-size:18px;font-weight:700;margin-bottom:8px;">Password Reset!</h3>
    <p style="color:#888;font-size:14px;margin-bottom:20px;">
      You can now login with your new password.
    </p>
    <a href="login.html" style="display:inline-block;background:#1a3c8f;color:#fff;
      padding:12px 28px;border-radius:10px;font-weight:700;text-decoration:none;">
      Go to Login
    </a>
  </div>
</div>

<script src="api.js"></script>
<script>
document.addEventListener('DOMContentLoaded', function () {
  var params = new URLSearchParams(window.location.search);
  var token  = params.get('token') || '';
  var msgBox = document.getElementById('msgBox');

  if (!token) {
    msgBox.className     = 'msg error';
    msgBox.textContent   = 'Invalid or expired reset link. Please request a new one.';
    msgBox.style.display = 'block';
    document.getElementById('formSection').style.display = 'none';
    return;
  }

  document.getElementById('resetBtn').addEventListener('click', async function () {
    var newPass     = document.getElementById('newPass').value;
    var confirmPass = document.getElementById('confirmPass').value;
    var btnTxt      = document.getElementById('btnText');
    var btnSpn      = document.getElementById('btnSpinner');
    var btn         = document.getElementById('resetBtn');

    msgBox.style.display = 'none';

    if (!newPass || newPass.length < 6) {
      msgBox.className     = 'msg error';
      msgBox.textContent   = 'Password must be at least 6 characters.';
      msgBox.style.display = 'block';
      return;
    }
    if (newPass !== confirmPass) {
      msgBox.className     = 'msg error';
      msgBox.textContent   = 'Passwords do not match.';
      msgBox.style.display = 'block';
      return;
    }

    btnTxt.style.display = 'none';
    btnSpn.style.display = 'inline';
    btn.disabled         = true;

    var result = await IMC_API.resetPassword(token, newPass);

    if (result.success) {
      document.getElementById('formSection').style.display = 'none';
      document.getElementById('successSection').style.display = 'block';
    } else {
      msgBox.className     = 'msg error';
      msgBox.textContent   = result.message || 'Reset failed. Please request a new link.';
      msgBox.style.display = 'block';
      btnTxt.style.display = 'inline';
      btnSpn.style.display = 'none';
      btn.disabled         = false;
    }
  });
});
</script>
</body>
</html>
