<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Sign Up – Inside My Campus</title>
  <link rel="stylesheet" href="style.css" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>
</head>
<body>

  <!-- NAVBAR -->
  <nav class="navbar">
    <div class="nav-container">
      <div class="nav-logo">
        <a href="index.html" style="display:flex; align-items:center; gap:10px;">
          <div class="logo-icon">🏫</div>
          <span class="logo-text">Inside My Campus</span>
        </a>
      </div>
      <div class="auth-buttons">
        <a href="login.html" class="btn-login">Login</a>
        <a href="signup.html" class="btn-signup">Sign Up</a>
      </div>
    </div>
  </nav>

  <!-- SIGNUP SECTION -->
  <section class="auth-section">
    <div class="auth-card">

      <div class="auth-icon">🎓</div>
      <h2 class="auth-title">Create Your Account</h2>
      <p class="auth-subtitle">Join thousands of students on Inside My Campus</p>

      <!-- Error Box -->
      <div class="auth-error" id="signupError" style="display:none;">
        <i class="fas fa-exclamation-circle"></i>
        <span id="signupErrorMsg">Something went wrong.</span>
      </div>

      <!-- Success Box -->
      <div class="auth-success" id="signupSuccess" style="display:none;">
        <i class="fas fa-check-circle"></i>
        <span>Account created! Redirecting you now...</span>
      </div>

      <div class="auth-form">

        <!-- First & Last Name -->
        <div class="name-row">
          <div class="form-group">
            <label for="signupFirstName">First Name</label>
            <div class="input-wrapper">
              <i class="fas fa-user input-icon"></i>
              <input type="text" id="signupFirstName" placeholder="First name" />
            </div>
          </div>
          <div class="form-group">
            <label for="signupLastName">Last Name</label>
            <div class="input-wrapper">
              <i class="fas fa-user input-icon"></i>
              <input type="text" id="signupLastName" placeholder="Last name" />
            </div>
          </div>
        </div>

        <!-- Email -->
        <div class="form-group">
          <label for="signupEmail">Email Address</label>
          <div class="input-wrapper">
            <i class="fas fa-envelope input-icon"></i>
            <input type="email" id="signupEmail" placeholder="Enter your email" />
          </div>
        </div>

        <!-- University -->
        <div class="form-group">
          <label for="signupUniversity">University</label>
          <div class="input-wrapper">
            <i class="fas fa-university input-icon"></i>
            <input type="text" id="signupUniversity" placeholder="e.g. UNILAG, UNN, UI..." />
          </div>
        </div>

        <!-- Password -->
        <div class="form-group">
          <label for="signupPassword">Password</label>
          <div class="input-wrapper">
            <i class="fas fa-lock input-icon"></i>
            <input type="password" id="signupPassword" placeholder="Min. 6 characters" />
            <button class="toggle-password" id="toggleSignupPassword" type="button">
              <i class="fas fa-eye" id="toggleSignupIcon"></i>
            </button>
          </div>
        </div>

        <!-- Confirm Password -->
        <div class="form-group">
          <label for="signupConfirmPassword">Confirm Password</label>
          <div class="input-wrapper">
            <i class="fas fa-lock input-icon"></i>
            <input type="password" id="signupConfirmPassword" placeholder="Repeat your password" />
          </div>
        </div>

        <!-- Terms Checkbox -->
        <div class="checkbox-row">
          <input type="checkbox" id="agreeTerms" />
          <label for="agreeTerms">
            I agree to the <a href="#">Terms & Conditions</a> and <a href="#">Privacy Policy</a>
          </label>
        </div>

        <!-- Submit -->
        <button class="btn-auth-submit" id="signupBtn">
          <span id="signupBtnText">Create Account</span>
          <span id="signupSpinner" style="display:none;">
            <i class="fas fa-spinner fa-spin"></i> Creating account...
          </span>
        </button>

<!-- Add INSIDE your existing auth-card, before the form fields -->

<!-- Google Sign-Up Button -->
<button class="google-btn" id="googleSignupBtn" type="button"
  style="width:100%;display:flex;align-items:center;justify-content:center;
  gap:10px;padding:12px 16px;background:#fff;border:1.5px solid #e0e0e0;
  border-radius:10px;font-size:14px;font-weight:600;color:#444;cursor:pointer;
  font-family:Inter,sans-serif;margin-bottom:16px;">
  <svg style="width:20px;height:20px;" viewBox="0 0 24 24">
    <path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/>
    <path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/>
    <path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/>
    <path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/>
  </svg>
  Continue with Google
</button>

<div style="display:flex;align-items:center;gap:10px;margin-bottom:16px;">
  <div style="flex:1;height:1px;background:#e8e8e8;"></div>
  <span style="font-size:12px;color:#aaa;white-space:nowrap;">or sign up with email</span>
  <div style="flex:1;height:1px;background:#e8e8e8;"></div>
</div>

        <!-- Divider -->
        <div class="auth-divider">
          <span>Already have an account?</span>
        </div>

        <!-- Switch to Login -->
        <a href="login.html" class="btn-auth-switch">Login Instead</a>

      </div>
    </div>
  </section>

  <footer class="auth-footer">
    <p>&copy; 2024 Inside My Campus. All rights reserved.</p>
  </footer>

  <script src="app.js"></script>
  <script src="auth.js"></script>
  <script src="api.js"></script>
  <script src="https://accounts.google.com/gsi/client" async defer></script>
<script>
window.handleGoogleResponse = async function (response) {
  if (!response || !response.credential) return;
  var result = await IMC_API.googleAuth(response.credential);
  if (result.success) window.location.href = 'index.html';
  else alert(result.message || 'Google signup failed.');
};

document.getElementById('googleSignupBtn').addEventListener('click', function () {
  if (typeof google !== 'undefined') {
    google.accounts.id.prompt();
  }
});

window.addEventListener('load', function () {
  var clientId = (window.GOOGLE_CLIENT_ID && !window.GOOGLE_CLIENT_ID.includes('YOUR_'))
    ? window.GOOGLE_CLIENT_ID : null;
  if (!clientId || typeof google === 'undefined') return;

  google.accounts.id.initialize({
    client_id: clientId,
    callback:  window.handleGoogleResponse,
    auto_select: false
  });
});
</script>

</body>
</html>
